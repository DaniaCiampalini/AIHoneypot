# ================================================================
# X Detector Module Configuration
# ================================================================

# Twitter API Configuration (optional - for future API integration)
# twitter.bearer-token=${TWITTER_BEARER_TOKEN:}
# twitter.api.base-url=https://api.twitter.com/2

# Detection thresholds
xdetector.threshold.confirmed-bot=0.8
xdetector.threshold.likely-bot=0.6
xdetector.threshold.uncertain=0.3

# Analyzer weights (must sum to 1.0)
xdetector.weights.profile=0.20
xdetector.weights.network=0.25
xdetector.weights.temporal=0.25
xdetector.weights.text=0.30
xdetector.weights.behavior=0.20

# Logging
logging.level.com.aihoneypot.xdetector=DEBUG

