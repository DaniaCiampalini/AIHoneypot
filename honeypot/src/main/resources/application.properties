# ================================================================
# AIHoneypot Application Configuration
# ================================================================

# ?? Application ?????????????????????????????????????????????????
spring.application.name=AIHoneypot
server.port=8080

# ?? Database (H2 for development, PostgreSQL for production) ????
spring.datasource.url=jdbc:h2:mem:honeypotdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ?? PostgreSQL (uncomment for production) ???????????????????????
#spring.datasource.url=jdbc:postgresql://localhost:5432/honeypotdb
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.username=honeypot_user
#spring.datasource.password=your_secure_password
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ?? Logging ?????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.aihoneypot=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ?? Jackson (JSON serialization) ????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ?? Session Management ??????????????????????????????????????????
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=HONEYPOT_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ?? Actuator (monitoring endpoints) ?????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ?? OpenAPI Documentation ???????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ?? Honeypot-Specific Settings ??????????????????????????????????
# Threshold for threat classification (0.0 - 1.0)
honeypot.threat.confidence-threshold=0.5

# Enable/disable canary traps
honeypot.canary.enabled=true

# Maximum sessions to track in memory
honeypot.session.max-active=10000

# Session cleanup interval (milliseconds)
honeypot.session.cleanup-interval=300000

